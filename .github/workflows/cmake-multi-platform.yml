name: CMake on multiple platforms

on:  # yamllint disable-line rule:truthy
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: true

      # Set up a matrix to run the following configurations:
      #
      # 1. <Latest OrangeC, windows-2025-vs2026, "MSYS Makefiles">
      #
      # 2. <OrangeC 6.73, windows-2022, "MSYS Makefiles">
      #
      # To add more build types (Release, Debug, RelWithDebInfo, etc.)
      # customize the build_type list.

      matrix:
        version: ["", 6.73.1]  # 6.0.42.1 (6.42.1) don't supported by CMake
        c_compiler: [occ]
        cpp_compiler: [occ]
        build_type: [Release]
        generator: ["MSYS Makefiles"]
        platform: [win32]
        # cmake_add: [--debug-trycompile]
        include:
          - version: ""  # Last, 7.0.7 at Mar 5, 2026
            os: windows-2025-vs2026
          - version: 6.73.1
            os: windows-2022

    steps:
      - uses: actions/checkout@v6

      - name: Lint
        run: |
          python -m pip install yamllint
          python -m yamllint --list-file .
          python -m yamllint .

      - name: Test action (Setup OrangeC with pre-installed MSYS2 for CMake)
        uses: ./
        with:
          version: ${{ matrix.version }}
          # verbose: true
          # cmake-update: true
          # install: patch
          # pacboy: clang:p

      - name: Configure CMake
        run: >
          cmake -B build
          -DCMAKE_CXX_COMPILER=${{ matrix.cpp_compiler }}
          -DCMAKE_C_COMPILER=${{ matrix.c_compiler }}
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -G "${{ matrix.generator }}"
          -S .
          ${{ matrix.cmake_add }}

      - name: Build
        run: cmake --build build --config ${{ matrix.build_type }}

      - name: Test
        run: ctest --output-on-failure --build-config ${{ matrix.build_type }}
          --test-dir build

      - name: Run Windows
        run: |
          cd build
          ./hello
          ./hello++
          ./bsd_echo my args
